name: Deploy to Homelab

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via homelab pipeline
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOMELAB_HOST }}
          username: ${{ secrets.HOMELAB_USER }}
          key: ${{ secrets.HOMELAB_SSH_KEY }}
          script: |
            set -e

            BRANCH="main"
            SITE_PATH="/home/${{ secrets.HOMELAB_USER }}/docker/sites/dashboard"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_SCRIPT="/home/${{ secrets.HOMELAB_USER }}/homelab-infra/scripts/deploy-site.sh"

            echo "Site path: $SITE_PATH"
            echo "Repo URL: $REPO_URL"
            echo "Branch: $BRANCH"

            mkdir -p "$(dirname "$SITE_PATH")"

            if [ ! -d "$SITE_PATH/.git" ]; then
              echo "Project folder does not exist yet. Cloning..."
              rm -rf "$SITE_PATH"
              git clone --branch "$BRANCH" "$REPO_URL" "$SITE_PATH"
            else
              echo "Project folder exists. Updating..."
              cd "$SITE_PATH"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            cat > "$SITE_PATH/.env" <<'EOF'
            APP_NAME=dashboard

            FRONTEND_DEV_PORT=5173
            BACKEND_DEV_PORT=3000

            APP_URL=https://dashboard.whodrey.com
            HOST_PORT=3095

            PORT=3000
            FRONTEND_ORIGIN=https://dashboard.whodrey.com
            CORS_ORIGINS=https://dashboard.whodrey.com
            GOOGLE_REDIRECT_URI=https://dashboard.whodrey.com/auth/google/callback
            GOOGLE_TOKEN_FILE=.tokens/google-calendar-token.json

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OAUTH_STATE_SECRET=${{ secrets.OAUTH_STATE_SECRET }}
            EOF

            chmod 600 "$SITE_PATH/.env"

            echo "Running homelab deploy pipeline..."
            bash "$DEPLOY_SCRIPT" "$SITE_PATH"
