services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/dashboard}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-dashboard}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}

    expose:
      - "3000"

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-frontend
    restart: unless-stopped

    ports:
      - "${HOST_PORT}:80"

    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: ${APP_NAME:-dashboard}-mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
