services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}

    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-frontend
    restart: unless-stopped

    ports:
      - "${HOST_PORT}:80"

    depends_on:
      - backend
