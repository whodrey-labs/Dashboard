services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-dashboard}-frontend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${HOST_PORT}:80"

    depends_on:
      - backend