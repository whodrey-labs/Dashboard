services:
  backend:
    image: node:22-alpine
    container_name: ${APP_NAME:-dashboard}-backend-dev
    working_dir: /app
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: development
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/dashboard}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-dashboard}

    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

    ports:
      - "${BACKEND_DEV_PORT:-4000}:4000"

    command: sh -c "npm install && npm run dev"

    depends_on:
      - mongodb

  frontend:
    image: node:22-alpine
    container_name: ${APP_NAME:-dashboard}-frontend-dev
    working_dir: /app
    restart: unless-stopped

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      DEV_API_PROXY_TARGET: http://backend:4000

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: ${APP_NAME:-dashboard}-mongodb-dev
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

volumes:
  backend_node_modules:
  frontend_node_modules:
  mongodb_data:
