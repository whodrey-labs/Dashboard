services:
  app:
    image: node:22-alpine
    container_name: ${APP_NAME:-homelab-app}-dev
    working_dir: /app
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "${DEV_PORT:-5173}:5173"

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"